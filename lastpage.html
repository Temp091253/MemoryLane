<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Final Memory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #ffd45e;
            --gold-deep: #f5a623;
            --ink: #2b1f4a;
            --panel-purple: rgba(46, 27, 82, 0.55);
            --white: #fffdf7;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Nunito', sans-serif;
            background: #1c1240;
            overflow-x: hidden;
        }

        .stage {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-photo {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: saturate(1.05);
        }

        .bg-veil {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(100deg,
                    rgba(20, 10, 45, 0.15) 0%,
                    rgba(20, 10, 45, 0.35) 38%,
                    rgba(20, 10, 45, 0.72) 56%,
                    rgba(20, 10, 45, 0.55) 100%);
        }

        .content-row {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1300px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 5vh 0vw 5vh 10vw;
        }

        /* ===== Panel ===== */
        .panel-wrap {
            position: relative;
            width: min(720px, 92vw);
            animation: floatIn 1.1s cubic-bezier(.2, .8, .2, 1) both;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(28px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .panel-frame {
            position: absolute;
            inset: -6% -8%;
            width: 116%;
            height: 112%;
            pointer-events: none;
            z-index: 3;
            filter: drop-shadow(0 0 26px rgba(255, 200, 90, 0.35));
        }

        .panel-inner {
            position: relative;
            z-index: 2;
            margin: 8% 9%;
            padding: 44px 46px 40px;
            background: radial-gradient(120% 140% at 30% 10%, rgba(90, 55, 150, 0.72), rgba(35, 18, 70, 0.86) 70%);
            backdrop-filter: blur(6px);
            border-radius: 42px;
            color: var(--white);
            text-align: center;
        }

        .panel-inner h1.title,
        .panel-inner p.greet,
        .panel-inner p.lede,
        .panel-inner p.closing {
            max-width: 82%;
            margin-left: auto;
            margin-right: auto;
        }

        .heart {
            font-size: 26px;
            display: block;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 8px rgba(255, 180, 80, .7));
        }

        .eyebrow {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 600;
            color: var(--white);
            font-size: 15px;
            letter-spacing: .04em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 0 2px;
        }

        h1.title {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: clamp(28px, 4vw, 38px);
            line-height: 1.15;
            margin: 0 0 6px;
            color: var(--white);
        }

        h1.title .highlight {
            color: var(--gold);
            text-shadow: 0 0 18px rgba(255, 196, 80, .55);
        }

        .divider {
            color: var(--gold);
            font-size: 14px;
            letter-spacing: .3em;
            margin: 10px 0 18px;
            opacity: .85;
        }

        p.lede {
            font-size: 16px;
            margin: 0 0 20px;
            line-height: 1.6;
            opacity: 0.95;
            white-space: pre-line;
        }

        .cta {
            appearance: none;
            border: none;
            cursor: pointer;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 17px;
            color: #3a2200;
            background: linear-gradient(180deg, #ffe08a, var(--gold-deep));
            padding: 15px 32px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 24px rgba(245, 166, 35, 0.45), 0 0 0 3px rgba(255, 255, 255, 0.08) inset;
            transition: transform .18s ease, box-shadow .18s ease;
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(245, 166, 35, 0.55), 0 0 0 3px rgba(255, 255, 255, 0.12) inset;
        }

        .cta:active {
            transform: translateY(0px) scale(.98);
        }

        .cta .arrow {
            display: inline-flex;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(58, 34, 0, 0.15);
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: transform .18s ease;
        }

        .cta:hover .arrow {
            transform: translateX(3px);
        }

        /* subtle floating sparkle accents */
        .sparkle {
            position: absolute;
            z-index: 4;
            color: var(--gold);
            opacity: .9;
            animation: twinkle 2.6s ease-in-out infinite;
            pointer-events: none;
        }

        .sparkle.s1 {
            top: -2%;
            right: 12%;
            font-size: 22px;
            animation-delay: 0s;
        }

        .sparkle.s2 {
            top: 30%;
            left: -4%;
            font-size: 16px;
            animation-delay: .8s;
        }

        .sparkle.s3 {
            bottom: 6%;
            right: -3%;
            font-size: 18px;
            animation-delay: 1.4s;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: .25;
                transform: scale(.85);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        /* Bottom-left brand mark */
        .brandmark {
            position: fixed;
            left: 5vw;
            bottom: 5vh;
            z-index: 2;
            color: var(--white);
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: .04em;
            opacity: 0;
            animation: fadeUp 1s ease .6s forwards;
        }

        .brandmark span {
            color: var(--gold);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: .92;
                transform: translateY(0);
            }
        }

        @media (max-width: 820px) {
            .content-row {
                justify-content: center;
                padding: 6vh 4vw;
            }

            .panel-inner {
                padding: 34px 24px 30px;
                margin: 10% 6%;
            }

            .bg-veil {
                background: linear-gradient(180deg, rgba(20, 10, 45, .25) 0%, rgba(20, 10, 45, .55) 45%, rgba(20, 10, 45, .85) 100%);
            }

            .brandmark {
                left: 50%;
                transform: translateX(-50%);
                bottom: 3vh;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <img class="bg-photo" src="Data/lastpage.png" alt="Final Memory">
    <div class="bg-veil"></div>

    <div class="stage">
        <div class="content-row">
            <div class="panel-wrap">
                <span class="sparkle s1">✨</span>
                <span class="sparkle s2">✦</span>
                <span class="sparkle s3">✨</span>

                <div class="panel-inner">
                    <span class="heart">🔮</span>
                    <p class="eyebrow">✨ The Final Memory</p>
                    <h1 class="title">Wait... <span class="highlight">Look Closer</span></h1>
                    <div class="divider">✦ ✦ ✦</div>

                    <p class="lede">Umm that's strange...
                        Every Memory Orb here has a story.
                        Except this one... It's empty.

                        Or maybe...
                        Not empty.
                        Just... Waiting. ✨</p>

                    <button class="cta" type="button" onclick="window.location.href='ending.html'">
                        Next Page <span class="arrow">→</span>
                    </button>
                </div>
            </div>
        </div>
    </div>



</body>

</html>
