name: Deploy Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir _site
          cp -r ./* _site/ 2>/dev/null || true
          cp -r .[^.]* _site/ 2>/dev/null || true

          # Make start.html the homepage
          if [ -f "_site/start.html" ]; then
            cp _site/start.html _site/index.html
          fi

          # Remove workflow files from published site
          rm -rf _site/.github

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
